services:
  mariadb:
    image: mariadb:10
    container_name: template_mariadb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: template
      MYSQL_USER: template
      MYSQL_PASSWORD: pikachu
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./tools/create_database.sql:/docker-entrypoint-initdb.d/create_database.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: template_mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped
    networks:
      - app-network

  auth-server:
    image: krgamestudios/auth-server:latest
    container_name: template_auth
    ports:
      - "3200:3200"
    environment:
      WEB_ORIGIN: http://localhost:3001
      WEB_PROTOCOL: http
      WEB_ADDRESS: localhost:3200
      WEB_RESET_ADDRESS: localhost:3001/reset
      WEB_PORT: 3200
      DB_HOSTNAME: mariadb
      DB_PORTNAME: 3306
      DB_DATABASE: auth
      DB_USERNAME: auth
      DB_PASSWORD: charizard
      DB_TIMEZONE: Australia/Sydney
      SECRET_ACCESS: access_secret_key_for_development
      SECRET_REFRESH: refresh_secret_key_for_development
      MAIL_SMTP: mailhog:1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_PHYSICAL: "Test Address, Test City, 12345"
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - app-network

  news-server:
    image: krgamestudios/news-server:latest
    container_name: template_news
    ports:
      - "3100:3100"
    environment:
      WEB_ORIGIN: http://localhost:3001
      WEB_PORT: 3100
      DB_HOSTNAME: mariadb
      DB_PORTNAME: 3306
      DB_DATABASE: news
      DB_USERNAME: news
      DB_PASSWORD: venusaur
      DB_TIMEZONE: Australia/Sydney
      PAGE_SIZE: 10
      SECRET_ACCESS: access_secret_key_for_development
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app-network

  chat-server:
    image: krgamestudios/chat-server:latest
    container_name: template_chat
    ports:
      - "3300:3300"
    environment:
      WEB_ORIGIN: http://localhost:3001
      WEB_PORT: 3300
      DB_HOSTNAME: mariadb
      DB_PORTNAME: 3306
      DB_DATABASE: chat
      DB_USERNAME: chat
      DB_PASSWORD: blastoise
      DB_TIMEZONE: Australia/Sydney
      SECRET_ACCESS: access_secret_key_for_development
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge
